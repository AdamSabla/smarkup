appId: com.smarkup.app
productName: smarkup
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
win:
  executableName: smarkup
  icon: build/icon.ico
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  icon: build/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  # dmg = first-install experience for users.
  # zip = required artifact for electron-updater to apply in-place updates on
  #       macOS. Without it, Mac users see the update banner but the install
  #       fails. Keep both.
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  # Notarization is required for auto-update to actually apply on macOS.
  # electron-updater verifies the downloaded ZIP's code signature against the
  # running app — unsigned/unnotarized builds will fail the verification and
  # silently refuse to update. Flip this to `true` once you add the Apple
  # Developer secrets to GitHub Actions (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD,
  # APPLE_TEAM_ID) — electron-builder picks them up automatically.
  notarize: false
dmg:
  icon: build/icon.icns
  artifactName: ${name}-${version}.${ext}
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: AdamSabla
  repo: smarkup
  releaseType: draft
